<script>
// Enhances each fenced code block with a toolbar: macOS-style window dots,
// a language label (from kramdown's `language-xxx` wrapper class) and a
// copy-to-clipboard button. Progressive enhancement — code is fully usable
// without JS; this only decorates it.
(function () {
  var COPY_ICON =
    '<svg class="code-copy-copy" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">' +
      '<rect x="5.5" y="5.5" width="8" height="9" rx="1.5"/>' +
      '<path d="M3.5 10.5h-1a1 1 0 0 1-1-1v-7a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v1"/>' +
    '</svg>' +
    '<svg class="code-copy-check" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">' +
      '<path d="M3 8.5l3.2 3.2L13 4.5"/>' +
    '</svg>';

  function labelFor(block) {
    var m = block.className.match(/language-([\w+#.-]+)/);
    if (!m) return '';
    var lang = m[1].toLowerCase();
    if (lang === 'plaintext' || lang === 'text') return '';
    var aliases = {
      js: 'JavaScript', ts: 'TypeScript', py: 'Python', rb: 'Ruby',
      sh: 'Shell', bash: 'Bash', yml: 'YAML', md: 'Markdown',
      scala: 'Scala', java: 'Java', html: 'HTML', css: 'CSS',
      json: 'JSON', xml: 'XML', sql: 'SQL'
    };
    return aliases[lang] || lang.toUpperCase();
  }

  function buildToolbar(label) {
    var bar = document.createElement('div');
    bar.className = 'code-toolbar';
    bar.innerHTML =
      '<span class="code-lang">' + label + '</span>' +
      '<button type="button" class="code-copy" aria-label="Copy code to clipboard">' +
        COPY_ICON + '<span class="code-copy-label">Copy</span>' +
      '</button>';
    return bar;
  }

  function copyText(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text);
    }
    return new Promise(function (resolve, reject) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); resolve(); }
      catch (e) { reject(e); }
      finally { document.body.removeChild(ta); }
    });
  }

  function enhance() {
    var blocks = document.querySelectorAll('div.highlighter-rouge, figure.highlight');
    Array.prototype.forEach.call(blocks, function (block) {
      if (block.querySelector('.code-toolbar')) return;          // idempotent
      var pre = block.querySelector('pre');
      if (!pre) return;

      var toolbar = buildToolbar(labelFor(block));
      block.insertBefore(toolbar, block.firstChild);

      var btn = toolbar.querySelector('.code-copy');
      var label = btn.querySelector('.code-copy-label');
      btn.addEventListener('click', function () {
        var code = block.querySelector('pre code') || pre;
        copyText(code.innerText.replace(/\n$/, '')).then(function () {
          btn.classList.add('copied');
          label.textContent = 'Copied!';
          setTimeout(function () {
            btn.classList.remove('copied');
            label.textContent = 'Copy';
          }, 1600);
        }).catch(function () {
          label.textContent = 'Error';
          setTimeout(function () { label.textContent = 'Copy'; }, 1600);
        });
      });
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', enhance);
  } else {
    enhance();
  }
})();
</script>
