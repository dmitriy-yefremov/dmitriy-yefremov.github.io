#
# Site configuration
#

# Name of your site (displayed in the header)
name: Dmitriy Yefremov

# Short bio or description (displayed in the header)
description: my personal blog about software development

# Path to your avatar / profile pic (served from this site)
avatar: /images/profile.jpg

# Your website URL, used for the sitemap and RSS feed
url: https://yefremov.net
baseurl: ""

# Includes an icon in the footer for each username you enter
footer-links:
  email: dmitriy@yefremov.net
  github: dmitriy-yefremov
  linkedin: yefremov
  rss: true

# Permalink style for posts
permalink: /blog/:title/

#
# Comments — giscus (https://giscus.app), backed by GitHub Discussions.
# Enable the Discussions feature on the repo, install the giscus app, then run
# the configurator at https://giscus.app and paste the generated values below.
# Comments only render once `repo` and the IDs are filled in.
#
giscus:
  repo: "dmitriy-yefremov/dmitriy-yefremov.github.io"
  repo_id: "MDEwOlJlcG9zaXRvcnkyNTg4ODEzMg=="
  category: "Comments"
  category_id: "DIC_kwDOAYsFhM4C-LTT"
  mapping: "pathname"
  theme: "light"

# Markdown / syntax highlighting
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"

# Sass (partials live in _scss, compiled output is minified for production)
sass:
  sass_dir: _scss
  style: compressed

# Plugins
plugins:
  - jekyll-feed     # generates /feed.xml
  - jekyll-sitemap  # generates /sitemap.xml
  - jemoji          # emoji please!

# Don't copy these into the built _site
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - vendor
